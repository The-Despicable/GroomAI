<!-- Script for Tab Switching & Micro-interactions -->
<script>
    function switchAuth(type) {
      const phoneBtn = document.getElementById('toggle-phone');
      const emailBtn = document.getElementById('toggle-email');
      const phoneSection = document.getElementById('section-phone');
      const emailSection = document.getElementById('section-email');

      if (type === 'phone') {
        phoneBtn.classList.add('active-toggle', 'text-primary');
        emailBtn.classList.remove('active-toggle', 'text-primary');
        phoneSection.classList.remove('hidden');
        emailSection.classList.add('hidden');
      } else {
        emailBtn.classList.add('active-toggle', 'text-primary');
        phoneBtn.classList.remove('active-toggle', 'text-primary');
        emailSection.classList.remove('hidden');
        phoneSection.classList.add('hidden');
      }
    }

    function togglePassword() {
      const pwd = document.getElementById('password-field');
      const icon = document.getElementById('password-icon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        pwd.type = 'password';
        icon.textContent = 'visibility';
      }
    }
  </script>
