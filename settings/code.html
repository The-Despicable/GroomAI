<script>
        function moveGlider(type, index) {
            const glider = document.getElementById(type + '-glider');
            const buttons = glider.parentElement.querySelectorAll('button');
            
            // Update Glider Position
            if (type === 'theme') {
                glider.style.left = `calc(${index * 33.33}% + 4px)`;
            } else if (type === 'font') {
                glider.style.left = `calc(${index * 50}% + 4px)`;
            }

            // Update Text Colors
            buttons.forEach((btn, i) => {
                if (i === index) {
                    btn.classList.add('text-on-primary');
                    btn.classList.remove('text-on-surface-variant');
                } else {
                    btn.classList.remove('text-on-primary');
                    btn.classList.add('text-on-surface-variant');
                }
            });

            // Demo logic for Dark Mode switch
            if (type === 'theme') {
                if (index === 2) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }
        }
