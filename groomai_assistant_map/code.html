<script>
        // Micro-interaction for map pins
        const pins = document.querySelectorAll('.group');
        pins.forEach(pin => {
            pin.addEventListener('click', () => {
                pins.forEach(p => p.classList.remove('scale-125'));
                pin.classList.add('scale-125');
                pin.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            });
        });

        // Simple scroll reveal for chat
        const chatContainer = document.querySelector('.chat-container');
        setTimeout(() => {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }, 500);
    </script>
