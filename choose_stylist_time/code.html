<!-- Date Picker -->
<section class="space-y-md">

<button class="time-slot py-md px-base rounded-lg border border-outline-variant text-center opacity-40 cursor-not-allowed" onclick="selectTime(this, '02:00 PM')">

<button class="time-slot py-md px-base rounded-lg border border-outline-variant text-center hover:border-secondary transition-all active:scale-95" onclick="selectTime(this, '03:00 PM')">

<div>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
<span class="font-label-md text-label-md mt-1">Bookings</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:text-primary transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">smart_toy</span>
<span class="font-label-md text-label-md mt-1">AI</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:text-primary transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-md text-label-md mt-1">Profile</span>
</a>

<script>
        let currentStylist = "Rahul";
        let currentTime = "11:00 AM";

        function updateSummary() {
            document.getElementById('selection-summary').innerText = `Selected: ${currentStylist}, ${currentTime}`;
        }

        function selectStylist(element, name) {
            document.querySelectorAll('.stylist-chip div').forEach(el => {
                el.classList.remove('border-primary');
                el.classList.add('border-transparent');
            });
            // If Any is clicked
            if(name === 'Any') {
                element.querySelector('div').classList.add('border-primary');
            } else {
                element.querySelector('div').classList.remove('border-transparent');
                element.querySelector('div').classList.add('border-primary');
            }
            
            currentStylist = name;
            updateSummary();
        }

        function selectTime(element, time) {
            if(element.classList.contains('cursor-not-allowed')) return;
            
            document.querySelectorAll('.time-slot').forEach(el => {
                el.classList.remove('border-2', 'border-primary', 'bg-primary-container');
                el.classList.add('border', 'border-outline-variant');
                el.querySelector('span').classList.remove('font-bold', 'text-on-primary-container');
                el.querySelector('span').classList.add('text-primary');
            });

            element.classList.remove('border', 'border-outline-variant');
            element.classList.add('border-2', 'border-primary', 'bg-primary-container');
            element.querySelector('span').classList.add('font-bold', 'text-on-primary-container');
            element.querySelector('span').classList.remove('text-primary');

            currentTime = time;
            updateSummary();
        }
    </script>
