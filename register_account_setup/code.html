<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.parentElement.classList.add('scale-[1.01]');
                this.parentElement.parentElement.style.transition = 'all 0.3s ease';
            });
            input.addEventListener('blur', function() {
                this.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Basic password strength simulation logic
        const passwordInput = document.getElementById('password');
        const progressBar = document.querySelector('.bg-amber-500');
        const strengthText = document.querySelector('.text-amber-600');

        passwordInput.addEventListener('input', function() {
            const length = this.value.length;
            if (length < 4) {
                progressBar.style.width = '25%';
                progressBar.className = 'h-full bg-error progress-bar-transition rounded-full';
                strengthText.innerText = 'Strength: Weak';
                strengthText.className = 'text-[10px] font-bold text-error uppercase tracking-tighter';
            } else if (length < 8) {
                progressBar.style.width = '50%';
                progressBar.className = 'h-full bg-amber-500 progress-bar-transition rounded-full';
                strengthText.innerText = 'Strength: Moderate';
                strengthText.className = 'text-[10px] font-bold text-amber-600 uppercase tracking-tighter';
            } else {
                progressBar.style.width = '100%';
                progressBar.className = 'h-full bg-secondary progress-bar-transition rounded-full';
                strengthText.innerText = 'Strength: Strong';
                strengthText.className = 'text-[10px] font-bold text-secondary uppercase tracking-tighter';
            }
        });
    </script>
